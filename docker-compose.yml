version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: anomaly_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: anomaly
      POSTGRES_PASSWORD: anomaly_secret
      POSTGRES_DB: anomaly_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anomaly"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: anomaly_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://anomaly:anomaly_secret@db:5432/anomaly_db
      SECRET_KEY: CHANGE_ME_IN_PRODUCTION
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - ./model/saved:/app/model/saved:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: anomaly_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pg_data:
